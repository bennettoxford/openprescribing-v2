metadata:
  title: ' Perindopril arginine cost per 1000 patients'
  description: Cost of perindopril arginine per 1000 patients
  why_it_matters: <p><a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#perindopril-arginine-2017' target='_blank'>NHS England guidance states</a>:</p><p><i>Perindopril is an ACE inhibitor used in heart failure, hypertension, diabetic nephropathy, and prophylaxis of cardiovascular events. The perindopril arginine salt version is more stable in extremes of climate than the perindopril erbumine salt, which gives it a longer shelf-life. However, perindopril arginine is significantly more expensive than perindopril erbumine and a <a href='https://www.prescqipp.info/our-resources/bulletins/bulletin-209-perindopril-arginine/'  target='_blank'>PrescQIPP CIC review of the topic found no clinical advantage for the arginine salt.</a></p><p>NICE guidance on hypertension in adults recommends that prescribing costs are minimised.</p><p>Due to the significant extra costs of the arginine salt and the availability of the erbumine salt, the joint clinical working group considered perindopril arginine suitable for inclusion in this guidance.</i></p><p><b>For guidance on when prescribing may be appropriate in some exceptional circumstances, please see the <a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#items-where-prescribing-may-be-appropriate-in-some-exceptional-circumstances' target='_blank'>full NHS England guidance document.</a></b>
  tags:
