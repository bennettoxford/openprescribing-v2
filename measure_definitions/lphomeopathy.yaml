metadata:
  title: Homeopathy cost per 1000 patients
  description: Cost of homeopathy per 1000 patients
  why_it_matters: <p><a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#homeopathy-2017' target='_blank'>NHS England guidance states</a>:</p><p><i>Homeopathy seeks to treat patients with highly diluted substances that are administered orally.</p><p>During the consultation we received a range of submissions pertaining to homeopathy and it was deemed necessary to have a further review to include the up to date evidence; this was conducted by the <a href='https://www.england.nhs.uk/publication/items-which-should-not-be-routinely-prescribed-in-primary-care-evidence-reviews/' target='_blank'>Specialist Pharmacy Service</a>. This review found no clear or robust evidence to support the use of homeopathy on the NHS.</p></i><p>NHS England recommend that GPs:<ul><li>Do not initiate.</li><li>Deprescribe in patients currently prescribed this medicine.</li></ul>
