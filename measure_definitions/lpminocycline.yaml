  title: Minocycline cost per 1000 patients
  description: Minocycline per 1000 patients
  why_it_matters: '<p><a href=''https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#minocycline-for-acne-2019'' target=''_Blank''>NHS England guidance states</a></p><p><i>Minocycline is a tetracycline antibiotic that can be used for many indications. In primary care it is mainly used for acne. There are various safety risks associated with its use.</p><p>NICE guidance on acne vulgaris management advises: ''Minocycline is not recommended for use in acne as it is associated with an increased risk of adverse effects such as drug-induced lupus, skin pigmentation and hepatitis.''</p><p>A PrescQIPP CIC review found no evidence to support the use of one tetracycline over another in terms of efficacy for the treatment of acne vulgaris, and alternative once daily products are available.</p></i><p>NHS England recommend that GPs:<ul><li>Do not initiate.</li><li>Deprescribe in patients currently prescribed this medicine.</li></ul>'
