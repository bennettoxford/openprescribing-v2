metadata:
  title: Prescribing of gabapentin and pregabalin (combined Defined Daily Dose (DDD) per 1000 patients
  description: Total DDD of pregabalin + gabapentin per 1000 patients
  why_it_matters: Gabapentin and pregabalin are increasingly used in neuropathic and other types of pain. There are concerns about the <a href='https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/385791/PHE-NHS_England_pregabalin_and_gabapentin_advice_Dec_2014.pdf' target='_Blank'>potential for abuse with these drugs</a>, as well as a risk of respiratory depression with both <a href='https://www.gov.uk/drug-safety-update/pregabalin-lyrica-reports-of-severe-respiratory-depression' target='_Blank'>pregabalin</a> and <a href='https://www.gov.uk/drug-safety-update/gabapentin-neurontin-risk-of-severe-respiratory-depression' target='_Blank'>gabapentin</a>.</p><p>There appears to be no robust evidence for dose conversion between gabapentin and pregabalin. We have therefore chosen to use the <a href='https://www.who.int/medicines/regulation/medicines-safety/toolkit_ddd/en/' target='_Blank'>Defined Daily Dose</a> (DDD) for this measure.  This is a similar dose ratio that <a href='https://www.ncbi.nlm.nih.gov/pubmed/20113408' target='_Blank'>Toth described</a> in his paper on the substitution of gabapentin with pregabalin.
  tags:
    - core
    - pain
    - safety
