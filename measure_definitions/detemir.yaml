# loosely based on insulin_detemir measure

metadata:
  title: Insulin detemir
  tags:
    - demo
  why_it_matters: |
    Novo Nordisk are [discontinuing all formulations of Levemir®](https://www.diabetes.org.uk/about-us/news-and-views/novo-nordisk-to-withdraw-levemir-what-you-need-to-know), the only insulin detemir product available in the UK, with supply due to exhaust by December 2026.
    The Primary Care Diabetes & Obesity Society (PCDOS) and Association of British Clinical Diabetologists (ABCD) have [written guidance](https://cms.pcdosociety.org/uploads/Levemir_Discontinuation_Guideline_Final_110825_17d277acd3.pdf) to support clinicians in selecting and safely initiating alternative basal insulins. The guidance recommends that local teams diversify prescribing across the available options to reduce supply risks. Given the significant regional variation in prescribing, it also advises using data to support planning.
    This OpenPrescribing measure, alongside it’s [OpenPrescribing Hospitals counterpart](https://hospitals.openprescribing.net/measures/insulin_detemir/) provides data on variation across primary and secondary care to support this planning.
