metadata:
  title: Travel vaccines cost per 1000 patients
  description: Cost of travel vaccines per 1000 patients
  why_it_matters: <p><a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#travel-vaccines-vaccines-administered-exclusively-for-the-purposes-of-travel-2017' target='_blank'>NHS England guidance states</a>:</p><i><p>The following vaccinations should not be prescribed on the NHS exclusively for the purposes of travel:</p><ul><li>hepatitis B</li><li>Japanese encephalitis</li><li>meningitis ACWY</li><li>yellow fever</li><li>tick-borne encephalitis</li><li>rabies</li><li>BCG.</li></ul><p>These vaccines should continue to be recommended for travel but the individual traveller will need to bear the cost of the vaccination.</p><p>For all other indications, as outlined in Immunisation Against Infectious Disease &ndash; the Green Book &ndash; the vaccine remains free on the NHS.</p></i><p><b>For guidance on when prescribing may be appropriate in some exceptional circumstances, please see the <a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#items-where-prescribing-may-be-appropriate-in-some-exceptional-circumstances' target='_blank'>full NHS England guidance document.</a></b>
