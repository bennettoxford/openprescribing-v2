metadata:
  title: 'Antibiotic stewardship: three-day courses for uncomplicated UTIs'
  description: Proportion of commonly used antibiotics for urinary-tract infections prescribed for more than 3 days
  why_it_matters: '<a href=''https://www.nice.org.uk/guidance/ng109/resources/visual-summary-pdf-6544021069''>NICE guidance on prescribing for lower urinary-tract infections</a> recommends a three day course of antibiotics for most women. Prescribing longer courses may be unnecessary, and also cost more. There are however some groups, such as males and pregnant patients, where longer durations are recommended.</p><p> The antibiotics included in this measure are:<ul><li>Pivmecillinam 200mg tablets: 400mg immediately then 200mg three times daily for 3 days (quantity: 10 tablets)</li><li>Trimethoprim 200mg tablets: 200mg twice daily for 3 days (quantity: 6 tablets)</li><li>Nitrofurantoin 50mg capsules or tablets: 50mg four times daily for 3 days (quantity: 12 tablets)</li><li>Nitrofurantoin 100mg modified-release capsules: 100mg twice daily for 3 days (quantity: 6 tablets)</li><li>Fosfomycin 3g granules sachet: 3g sachet as a single dose (quantity: 1 sachet)</li></p>'
  tags:
    - antimicrobial
    - core
    - infections
    - nice
  numerator_short: Antibiotic items for more than 3 days
