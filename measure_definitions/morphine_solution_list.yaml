metadata:
  title: Volume of immediate release oral morphine liquid prescribed
  description: Milligrams of immediate release oral morphine liquid per 1000 patients
  why_it_matters: A national <a href='https://www.hssib.org.uk/patient-safety-investigations/unintentional-overdose-of-morphine-sulfate-oral-solution/investigation-report/' target='_Blank'>patient safety investigation</a> has highlighted risks associated with morphine oral solution, including dosing errors and accidental overconsumption.It has been implicated in a number of <a href='https://www.england.nhs.uk/south/wp-content/uploads/sites/6/2016/08/cd-newsletter.pdf' target='_Blank'>drug-related deaths in the NHS</a>, including cases of unintentional overdose.</p><p>Particular concerns include the risk of patients 'swigging' morphine oral solution directly from the bottle rather than measuring individual doses, and the supply of large quantities over extended periods. Oral morphine solution 10mg/5ml is a Schedule 5 Controlled Drug with fewer controls than other morphine formulations, which are Schedule 2. This may increase the likelihood of larger volumes being supplied and continued without the safeguards applied to other opioid formulations.</p><p>Morphine oral solution also contains high quantities of alcohol and sugar. For example branded <a href='https://mhraproducts4853.blob.core.windows.net/docs/ded38835b171a612e33c82e0103d5482cd76d1a3' target='_Blank'>Oramorph</a> contains around 90g of sugar and 24g of ethanol, equivalent to three units of alcohol, in each 300ml bottle. These factors should be considered alongside the opioid content when assessing clinical risk.</p><p>You can read more about the rationale behind this measure, and the wider considerations surrounding the use of oral liquid morphine, <a href='https://www.bennett.ox.ac.uk/blog/2026/02/oral-morphine-liquid-new-openprescribing-measures/' target='_Blank'>in our guest blog</a>.</p>
