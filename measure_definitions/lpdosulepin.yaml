metadata:
  title: Dosulepin cost per 1000 patients
  description: Cost of dosulepin per 1000 patients
  why_it_matters: '<p><a href=''https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#dosulepin-2017'' target=''_blank''>NHS England guidance states</a>:</p><p><i>Dosulepin, formerly known as dothiepin, is a tricyclic antidepressant. NICE guidance on depression in adults has a ‘do not do’ recommendation: Do not switch to, or start, dosulepin because evidence supporting its tolerability relative to other antidepressants is outweighed by the increased cardiac risk and toxicity in overdose.</p><p>Due to the significant safety concerns advised by NICE, the joint clinical working group considered dosulepin suitable for inclusion in this guidance.</p></i><p><b>For guidance on when prescribing may be appropriate in some exceptional circumstances, please see the <a href=''https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#items-where-prescribing-may-be-appropriate-in-some-exceptional-circumstances'' target=''_blank''>full NHS England guidance document.</a></b>'
