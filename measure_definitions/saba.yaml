metadata:
  title: Short acting beta agonist (SABA) inhalers compared with prescribing of inhaled corticosteroid inhalers and SABA inhalers
  description: Number of short acting beta agonist (SABA) inhalers - salbutamol and terbutaline - compared with number of all inhaled corticosteroid inhalers and SABA inhalers
  why_it_matters: The <a href='https://www.nice.org.uk/guidance/ng245/2024'  target='_Blank'>BTS/NICE/SIGN guidance</a> has updated guidance on use of short acting beta agonists (SABAs), and states <a href='https://www.nice.org.uk/guidance/ng245/chapter/Recommendations#principles-of-pharmacological-treatment'  target='_Blank'><i>do not prescribe short-acting beta<sub>2</sub> agonists to people of any age with asthma without a concomitant prescription of an ICS</a>.</i>  In addition, it also recommends that patients aged 12 and over with uncontrolled asthma (e.g. needing a reliever 3 or more days a week) <a href='https://www.nice.org.uk/guidance/ng245/chapter/Recommendations#pharmacological-management-in-people-aged-12-and-over' target='_Blank'>should have their treatment changed to a non SABA-based regimen</a>.</p><p><a href='https://www.rcplondon.ac.uk/projects/outputs/why-asthma-still-kills' target='_Blank'>Why Asthma Still Kills</a> reports that high use of SABAs (salbutamol and terbutaline) and poor adherence to inhaled corticosteroids in asthma suggests poor control - these patients should be reviewed regularly to ensure good control.</p><p>The <a href='https://www.england.nhs.uk/long-read/national-medicines-optimisation-opportunities-2023-24/#11-optimising-inhaler-use-to-improve-respiratory-outcomes-and-reduce-carbon-emissions' target='_Blank'>NHS England National Medicines Optimisation Opportunities for 2024/25</a> identify improving patient outcomes from the use of inhalers as an area for improvement.</p><p><b>Please note:</b> we have excluded triple therapy inhalers from this measure, as they are more commonly used in COPD.</p>
