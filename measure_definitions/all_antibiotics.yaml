metadata:
  title: 'Antibiotic stewardship: volume of antibiotic prescribing'
  description:
    - Prescription items for all oral antibacterial drugs (excluding antituberculosis drugs and antileprotic drugs) per 1000 patients
  why_it_matters: Antibiotics play a critical role in modern medicines, as both a treatment of common infections and for the prevention of infections, for example in patients undergoing surgery or chemotherapy.  <a href='https://www.england.nhs.uk/ourwork/prevention/antimicrobial-resistance-amr/' target='_Blank'>Antimicrobial resistance</a> therefore poses a significant threat to public health. To help slow the development of resistance it is important that antiobiotics aren't overused.
