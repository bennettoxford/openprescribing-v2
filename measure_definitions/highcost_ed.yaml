metadata:
  title: WIP Spend on high-cost drugs for erectile dysfunction per 1000 patients
  description: Spend on drugs for erectile dysfunction which are not low-cost generic PD5E-inhibitor tablets per 1000 patients
  why_it_matters: |
    Phosphodiesterase-5 (PDE-5) inhibitors are the recommended as the [first line treatment for erectile dysfunction](https://cks.nice.org.uk/erectile-dysfunction).
    Most of these are now generic and inexpensive, and should ideally be considered before more expensive treatments.  Other treatments are also available, usually following specialist referral.
