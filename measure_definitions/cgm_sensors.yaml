  description: Prescribing of continuous glucose monitoring sensors per 1000 patients
  why_it_matters: Continuous glucose monitoring devices (CGM) can significantly reduce the need for people with diabetes to conduct finger-prick testing.</p><p>NICE guidance for <a href='https://www.nice.org.uk/guidance/ng17' target='_Blank'>Type 1 diabetes in adults</a>, <a href='https://www.nice.org.uk/guidance/ng28' target='_Blank'>Type 2 diabetes in adults</a> and <a href='https://www.nice.org.uk/guidance/ng18' target='_Blank'>Type 1 and Type 2 diabetes in children and young people</a> were all updated in March 2022. The updates include recommendations that all patients with type 1 diabetes should be offered a choice of real-time continuous glucose monitoring (rtCGM) or intermittently scanned continuous glucose monitoring (isCGM) and that adults with type 2 diabetes on multiple daily insulin injections should be offered GM where they meet specific clinical criteria.
