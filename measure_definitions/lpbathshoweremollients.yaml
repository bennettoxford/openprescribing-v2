  title: Bath and Shower emollients cost per 1000 patients
  description: Bath and Shower emollients per 1000 patients
  why_it_matters: <p><a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#bath-and-shower-preparations-for-dry-and-pruritic-skin-conditions-updated-2023' target='_blank'>NHS England guidance states</a>:</p><p><i><a href='https://www.nice.org.uk/guidance/cg57' target='_blank'>NICE guidance</a> recommends that emollient bath additives should not be offered to children under the age of 12 for the management of atopic eczema, because they are not clinically- or cost-effective.</p><p>'Leave-on' emollient moisturisers can still be used for treating eczema. These emollients can also be used as a soap substitute.</p><p>It is recognised that this recommendation applies only to children; however, it was agreed that it is acceptable to extrapolate this recommendation to apply to adults until other good quality evidence emerges.</p></i><p><b>For guidance on when prescribing may be appropriate in some exceptional circumstances, please see the <a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#items-where-prescribing-may-be-appropriate-in-some-exceptional-circumstances' target='_blank'>full NHS England guidance document.</a></b>
