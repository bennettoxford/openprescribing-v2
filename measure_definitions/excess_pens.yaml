metadata:
  title: Semaglutide or tirzepatide prescriptions for quantity of 4 pens or more
  description: Total quantity where a prescription is for four pens per prescription as a proportion of all semaglutide and tirzepatide prescribing
  why_it_matters: Semaglutide and tirzepatide are both used mainly to treat diabetes. Semaglutide injection is used weekly and is only available as a multidose pre-filled pen, each of which contains four doses so one multidose pen will last for one month. Tirzepatide is used weekly and is licensed in both a single-use and a multidose pre-filled pen form. The tirzepatide multidose pen contains four doses so one multidose pen will last for one month.</p> <p>There have been some reports that prescribers are requesting four multidose pens per month in error. This is unlikely to be required and likely to be caused by the dose and quantity being confused on a picking list.</p>
  tags:
