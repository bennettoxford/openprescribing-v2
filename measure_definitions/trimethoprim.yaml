metadata:
  title: 'Antibiotic stewardship: trimethoprim as a percentage of prescribing of nitrofurantoin and trimethoprim'
  description: Trimethoprim as a percentage of prescribing of nitrofurantoin and trimethoprim
  why_it_matters: Resistance to trimethoprim is increasing, and therefore NICE guidelines recommend that <a href='https://www.nice.org.uk/guidance/ng109'> nitrofurantoin is used first for empirical treatment of urinary tract infections</a> unless there is a low risk of trimethoprim resistance.<p> You can read our paper on the implementation of this guidance in the <a href='https://doi.org/10.1093/jac/dky509'>Journal of Antimicrobial Chemotherapy</a>.</p>
  tags:
    - antimicrobial
    - infections
  numerator_short: Trimethoprim items
  denominator_short: Total trimethoprim and nitrofurantoin items
