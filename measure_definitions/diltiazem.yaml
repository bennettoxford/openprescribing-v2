metadata:
  title: diltiazem preparations (whether generic or by brand)
  description: Total items of generic diltiazem modified-release preparations, as a proportion of total items of all dilitiazem modified-release items (>60mg)
  why_it_matters: '<a href=''https://bnf.nice.org.uk/drugs/diltiazem-hydrochloride/#prescribing-and-dispensing-information''>The BNF states</a>: Different versions of modified-release preparations containing more than 60 mg diltiazem hydrochloride may not have the same clinical effect. To avoid confusion between these different formulations of diltiazem, prescribers should specify the brand to be dispensed.You can read more in our detailed paper on <a href=''https://doi.org/10.2196/17003''> unsafe prescribing of diltiazem</a>.'
  tags:
    - cardiovascular
    - core
    - generic
    - safety
  numerator_short: Generic diltiazem items
  denominator_short: Dilitazem items
