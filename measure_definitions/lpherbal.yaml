metadata:
  title: Herbal medicines cost per 1000 patients
  description: Cost of herbal medicines per 1000 patients
  why_it_matters: '<p><a href=''https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#herbal-treatments-and-other-natural-products-updated-2023'' target=''_blank''>NHS England guidance states</a>:</p><p><i>Under a traditional herbal registration (THR) there is no requirement to prove scientifically that a product works; the registration is based on longstanding use of the product as a traditional medicine.</p><p>Due to the lack of scientific evidence required to register these products with the MHRA, the joint clinical working group felt that they were suitable for inclusion in this guidance.</p><p>In addition to herbal treatments with a THR, other natural products without robust evidence of clinical effectiveness should not be prescribed at NHS expense and fall within these recommendations. These products do not have a THR, are not recognised as supplements in the NHS Drug Tariff and do not appear as medicines in the BNF. These include:<ul><li>natural oils, eg eucalyptus and almond</li><li>coenzyme Q10 (ubiquinone and ubidecarenone)</li><li>evening primrose (gamolenic acid).</li></ul></p><p>MHRA withdrew the licence for 2-gamolenic acid preparations in 2002 due to a lack of evidence of efficacy.</i></p>NHS England recommend that GPs</a>:<ul><li>Do not initiate.</li><li>Deprescribe in patients currently prescribed this medicine.</li></ul></p><p><b>Please note: this measure does not currently include natural oil preparations.</b>'
