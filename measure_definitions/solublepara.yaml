metadata:
  title: Soluble/effervescent forms of paracetamol and co-codamol as a percentage of prescribing of all paracetamol and co-codamol tablets and capsules
  description: Prescribing of soluble/effervescent forms of paracetamol and co-codamol as a percentage of prescribing of all paracetamol and co-codamol tablets and capsules
  why_it_matters: Soluble and effervescent preparations of analgesics contain <a href='https://www.sps.nhs.uk/articles/sodium-content-of-cold-and-flu-preparations-and-painkillers/'>high sodium content.</a> 8 soluble paracetamol per day will exceed the recommended sodium intake for an adult of 2.4g (6g salt). In addition, these products are considerably more expensive than standard tablets or capsules. Therefore, ideally they should only be recommended in patients with genuine swallowing difficulties.
