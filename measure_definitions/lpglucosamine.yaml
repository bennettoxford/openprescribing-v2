metadata:
  title: cost per 1000 patients
  description: Cost of glucosamine and chondroitin per 1000 patients
  why_it_matters: '<p><a href=''https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#glucosamine-and-chondroitin-2017'' target=''_blank''>NHS England guidance states</a>:</p><p><i>Glucosamine and chondroitin are nutraceuticals used to improve pain associated with osteoarthritis. <a href=''https://bnf.nice.org.uk/drug/glucosamine.html'' target=''_blank''>The BNF states</a>: ''The mechanism of action is not understood and there is limited evidence to show it is effective''.</p><p>NICE guidance on osteoarthritis care and management has the following ''do not do'' recommendation: Do not offer glucosamine or chondroitin products for the management of osteoarthritis.</p><p>Due to the recommendation from NICE and the lack of evidence as advised by the BNF, the joint clinical working group considered glucosamine and chondroitin suitable for inclusion in this guidance.</p></i><p>NHS England recommend that GPs:<ul><li>Do not initiate.</li><li>Deprescribe in patients currently prescribed this medicine.</li></ul>'
