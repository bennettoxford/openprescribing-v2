metadata:
  title: Co-proxamol cost per 1000 patients
  description: Cost of co-proxamol per 1000 patients
  why_it_matters: <p><a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#co-proxamol-updated-2023' target='_blank'>NHS England guidance states</a>:</p><p><i>The Medicines and Healthcare products Regulatory Agency (MHRA) fully withdrew the painkiller co-proxamol from the UK market in 2007 due to safety concerns. All use in the UK is now on an unlicensed basis. Prescribing an unlicensed medicine should be in line with <a href='https://www.gmc-uk.org/-/media/documents/prescribing-guidance-before-cie_pdf-85261358.pdf' target='_blank'>General Medical Council (GMC) guidance</a>, which states suitably licensed alternatives need to be considered and the prescriber must be satisfied that there is sufficient evidence or experience of using the medicine to demonstrate its safety and efficacy.</p><p>Since 1985 advice aimed at the reduction of co-proxamol toxicity and fatal overdose has been provided, but this was not effective and resulted in withdrawal of co-proxamol by the MHRA. In 2011 MHRA reported that the withdrawal of co-proxamol from the UK had saved an estimated 300 to 400 lives each year from self-poisoning, around a fifth of which would have been accidental. Since the withdrawal, further safety concerns have been raised, resulting in co-proxamol being withdrawn in other countries.</p><p>Due to the significant safety concerns, the joint clinical working group considered co-proxamol suitable for inclusion in this guidance. Co-proxamol is no longer manufactured or supplied in the UK and any use on an unlicensed basis requires it to be imported for individual use, at an increasing cost to the NHS and the environment.</p></i><p>NHS England recommend that GPs:<ul><li>Do not initiate.</li><li>Deprescribe in patients currently prescribed this medicine.</li></ul></p><p>The average cost per item is now <b>£660</b> (November 2025), which is an increase of <b>£395</b> since 2022.
