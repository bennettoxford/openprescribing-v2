metadata:
  title: 'Antibiotic stewardship: courses for amoxicillin 500mg greater than 15 capsules'
  description: Proportion of prescription items of amoxicillin 500mg capsules with quantity greater than 15 capsules
  why_it_matters: <a href='https://academic.oup.com/jac/article/73/suppl_2/ii2/4841822' target='_Blank'>The most common indication for the prescribing of amoxicillin in primary care</a> is the treatment of respiratory-tract infections. NICE guidance recommends for example that, where amoxicillin is used for cough, the dose is <a href='https://www.nice.org.uk/guidance/ng120/resources/visual-summary-pdf-6664861405' target='_Blank'> 500mg three times a day for 5 days.</a> Where greater than 5 days treatment is prescribed for these indications, this increases both the unnecessary prescribing of antibiotics, as well as cost. There are however some indications which require higher doses/longer durations of amoxicillin for example, treatment of <i>H. pylori</i>.</p><p><a href='https://www.england.nhs.uk/long-read/national-medicines-optimisation-opportunities-2023-24/#14-reducing-course-length-of-antimicrobial-prescribing' target='_Blank'>NHS England National Medicines Optimisation Opportunities for 2024/25</a>identify use of the shortest effective antibiotic courses as an area for improvement, and suggests that 60% of amoxicillin prescriptions should be 5-day courses by March 2025.
