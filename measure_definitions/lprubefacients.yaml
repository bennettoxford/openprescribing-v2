  title: Rubefacients cost per 1000 patients
  description: Cost of rubefacients per 1000 patients
  why_it_matters: '<p><a href=''https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#rubefacients-benzydamine-mucopolysaccharide-and-cooling-products-excluding-topical-nsaids-and-capsaicin-updated-2023'' target=''_blank''>NHS England guidance states</a>:</p><p><i>Rubefacients are topical preparations that cause irritation and reddening of the skin due to increased blood flow. They are believed to relieve pain in various musculoskeletal conditions and are available on prescription and in OTC remedies. They may contain nicotinate compounds, salicylate compounds, essential oils and camphor.</p><p>The BNF states: &ldquo;The evidence available does not support the use of topical rubefacients in acute or chronic musculoskeletal pain&rdquo;.</p><p>NICE has issued the following &lsquo;do not do&rsquo; recommendation: Do not offer rubefacients for treating osteoarthritis.</p><p>Due to limited evidence and NICE recommendations, the joint clinical working group considered rubefacients (excluding topical NSAIDs) suitable for inclusion in this guidance.</p><p>Other miscellaneous topical analgesics containing benzydamine, mucopolysaccharide polysulphate or cooling ingredients fall under this category. Benzydamine and mucopolysaccharide are weak prostaglandin inhibitors and are therefore pharmacologically different from those routinely referred to as NSAIDs in current practice (such as ibuprofen and diclofenac), so it cannot be presumed that the clinical evidence relating to NSAIDs can be extrapolated to benzydamine or mucopolysaccharide polysulphate containing products (Rubefacients and miscellaneous topical analgesics, PrescQIPP, July 2021). </p><p>The Clinical Knowledge Summary on sprains and strains (NICE, 2020) does not specifically discuss cooling sprays and gels, but does suggest ice is used for self-management strategiesin the first 48-72 hours after injury.</p><p>Due to limited evidence and the NICE recommendations, the joint clinical working group considered these additional products suitable for inclusion in this category.</p></i><p><b>For guidance on when prescribing may be appropriate in some exceptional circumstances, please see the <a href=''https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#items-where-prescribing-may-be-appropriate-in-some-exceptional-circumstances'' target=''_blank''>full NHS England guidance document.</a></b>'
