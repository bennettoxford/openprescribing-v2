metadata:
  title: NSAIDs (including COX-2 inhibitors) - percentage items excluding naproxen and ibuprofen
  description: Number of prescription items for all NSAIDs excluding ibuprofen and naproxen as a percentage of the total items for all NSAIDs
  why_it_matters: There have been a number of concerns about the safety of a number of anti-inflammatory drugs, including COX-2 inhibitors and some 'traditional' NSAIDS, for their effects on the stomach, kidneys and the risk of blood clots.  <a href='https://cks.nice.org.uk/topics/nsaids-prescribing-issues/'>NICE CKD recommends that</a> in patients with ischaemic heart disease, cerebrovascular disease, or peripheral arterial disease ibuprofen (up to 1200mg per day) and naproxen (up to 1000mg) should be prescribed first-lineand COX-2 inhibitors, diclofenac, and high-dose ibuprofen are contraindicated
  tags:
    - cardiovascular
    - core
    - nice
    - pain
    - safety
  numerator_short: NSAID items (excl naproxen and ibuprofen)
  denominator_short: NSAID items
