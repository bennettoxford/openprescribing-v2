metadata:
  title: Seven Day Prescribing for Long Term Conditions
  description: Total quantity where a prescription is for seven tablets or capsules of common LTC medicines as a proportion of all tablets or capsules for common LTC medicines
  why_it_matters: 'There is no current consensus on durations of prescriptions across the NHS and prescribers are advised that they should write a prescription for a duration that is clinically appropriate. The <a href=''https://www.bma.org.uk/advice-and-support/gp-practices/prescribing/prescribing-in-general-practice'' target=''_Blank''>British Medical Association reports</a> growing requests to prescribe seven day quantities of medicines to fund supply of medicine compliance aids (MCAs), adding to GP workload. The Royal Pharmaceutical Society <a href=''https://www.rpharms.com/about-us/news/details/use-of-multi-compartment-compliance-aids'' target=''_Blank''>states</a> that while some may think of MCAs as a solution, there is limited evidence base to support their use, but other interventions also exist, which as part of a patient-centred and quality approach, must also be considered.<p><p>This measure of seven day prescriptions for long-term conditions is a surrogate measure for MCAs. Caveats include; a seven day prescription may be clinically relevant even for long-term conditions in certain circumstances, somepharmacies will supply a MCA without a seven day prescription after making an individual assessment, and some local areasmay fund provision of MCAs via a separate payment. Locally you may wish to review prescriptions of seven day duration for clinicalappropriateness. Additionally the NHS Long Term Plan has set out targets for the NHS to reduce the negative impact it has on theenvironment. Many MCAs will be single use plastics or cardboards so if they are being supplied inappropriately there will be an opportunity to reduce waste in this area.<p>The medicines we have used for the measure are generally used once daily for long term conditions: atorvastatin, simvastatin, levothyroxine, amlodipine and ramipril.</p>You can read more detail on the <a href=''https://github.com/ebmdatalab/jupyter-notebooks/blob/master/new_measures/Seven%20Day%20Prescribing%20for%20Long%20Term%20Conditions/Seven%20Day%20Prescribing%20for%20Long%20Term%20Conditions.ipynb'' target=''_Blank''>measure definition notebook</a> and <a href=''https://www.bennett.ox.ac.uk/blog/2019/10/new-measure-seven-day-prescribing-for-long-term-conditions/'' target=''_Blank''>on our blog</a>.'
