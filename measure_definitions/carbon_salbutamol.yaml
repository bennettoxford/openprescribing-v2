  description: Mean carbon impact (kg CO<sub>2</sub>e) per salbutamol inhaler prescribed
  why_it_matters: <p>The updated <a href='https://www.nice.org.uk/guidance/ng245/chapter/Recommendations#principles-of-pharmacological-treatment' target='_Blank'>BTS/NICE/SIGN guidance on asthma management</a> recommends basing inhaler choice on:<i><ul><li>an assessment of correct technique</li><li>the preference of the person receiving the treatment</li><li>the lowest environmental impact among suitable devices</li><li>the presence of an integral dose counter.</li></ul></i></p>The NHS has <a href='https://www.england.nhs.uk/greenernhs/a-net-zero-nhs/' target='_Blank'> committed to reducing its carbon footprint by 80% by 2028 to 2032</a>, including a shift to lower carbon inhalers.</p><p>Salbutamol metered dose inhalers (MDIs) are the single biggest source of carbon emissions from NHS medicines prescribing.</p><p>The <a href='https://www.england.nhs.uk/long-read/national-medicines-optimisation-opportunities-2023-24/#11-optimising-inhaler-use-to-improve-respiratory-outcomes-and-reduce-carbon-emissions' target='_Blank'>NHS England National Medicines Optimisation Opportunities for 2024/25</a> identify reducing carbon emissions from inhalers as an area for improvement.</p><p>Data on carbon emissions per salbutamol inhaler can be viewed in the <a href='https://docs.google.com/spreadsheets/d/1eyk2iqNM_4sobDzevZWWcRR00O2tmJO5HwdFZLjhfa4' target='_Blank'>table here</a>.</p>
