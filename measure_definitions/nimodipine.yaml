metadata:
  title: 'Nimodipine: Quantity per 1000 patients'
  description: Quantity of nimodipine tablets per 1000 patients
  why_it_matters: The only indication in the BNF for the prescription of nimodipine is <a href='https://bnf.nice.org.uk/drugs/nimodipine/' target='_Blank'>prevention of ischaemic neurological defects following aneurysmal subarachnoid haemorrhage</a>. The course length is 21 days but most patients will complete the course while admitted or be discharged with the remainder. Extension of this course in primary care may be due to error or miscommunication.
