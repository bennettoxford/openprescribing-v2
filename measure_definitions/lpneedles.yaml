metadata:
  title: Cost per 1000 registered patients
  description: Cost of higher cost (≥£5 per 100 needles) insulin pen needles per 1000 patients
  why_it_matters: <p><a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#needles-for-pre-filled-and-reusable-insulin-pens-2019' target='_blank'>NHS England guidance states</a>:</p><p><i>Pen needles are available in sizes from 4mm to 12mm and cost from £3.95 to £30.08 for 100 (NHS Drug Tariff). Different needles will fit different pens, but some fit all major insulin delivery pen devices currently available.</p><p>Rationalising use ensures that the most cost-effective options are used first line.</p><p><a href='http://fit4diabetes.com/united-kingdom/' target='_blank'>The Forum for Injection Technique (FIT) UK</a> considers the 4mm needle to be the <b>safest</b> pen needle for adults and children, regardless of age, gender and body mass index (BMI).</p><p>Using shorter length needles helps prevent intramuscular injection of insulin. (IM injection of insulin can result in unpredictable blood glucose levels.) Therefore, the most cost-effective 4mm needle should be chosen.</p><p>For patients currently using longer pen needle lengths (8mm, 12mm), changing to a shorter length (6mm or less) is advised, but only after discussion with a healthcare professional to ensure they receive advice on the correct injection technique.</p><p>For patients who cannot self-administer, it may be appropriate for the healthcare professional to use a safety needle; however, this would not need to be supplied on prescription.</p></i><p><b>For guidance on when prescribing may be appropriate in some exceptional circumstances, please see the <a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#items-where-prescribing-may-be-appropriate-in-some-exceptional-circumstances' target='_blank'>full NHS England guidance document.</a></b>
