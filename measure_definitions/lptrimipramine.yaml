metadata:
  title: Trimipramine cost per 1000 patients
  description: Cost of trimipramine per 1000 patients
  why_it_matters: <p><a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#trimipramine-2017' target='_Blank'>NHS England guidance states</a>:</p><i><p>The tricyclic antidepressant (TCA) trimipramine is significantly more expensive than other antidepressants.</p><p>NICE guidance on depression in adults recommends selective serotonin reuptake inhibitor (SSRI) antidepressants first line if indicated as they have a more favourable risk-to-benefit ratio compared to TCAs. However, if a TCA is required, more cost-effective TCAs than trimipramine are available.</p><p>Due to the significant cost associated with trimipramine and the availability of alternative treatments, the joint clinical working group considered trimipramine suitable for inclusion in this guidance.</p></i><p><b>For guidance on when prescribing may be appropriate in some exceptional circumstances, please see the <a href='https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#items-where-prescribing-may-be-appropriate-in-some-exceptional-circumstances' target='_blank'>full NHS England guidance document.</a></b>
