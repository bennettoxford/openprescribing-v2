metadata:
  title: 'Gluten-free products: cost per 1000 patients'
  description: Cost of gluten-free products per 1000 patients
  why_it_matters: Gluten-free products are available on prescription for patients who have a biopsy-confirmed diagnosis of coeliac disease. These products are also now available to purchase, e.g. from supermarkets.Following a <a href='https://www.gov.uk/government/consultations/availability-of-gluten-free-foods-on-nhs-prescription' target='_Blank'>consultation</a> in 2017, the Drug Tariff was amended to only allow gluten-free breads or gluten-free food mixes on prescription.Please note this list now excludes low-protein products which are also categorised by dm+d and NHSBSA as being gluten-free, asthese products have different indications for ACBS use.
