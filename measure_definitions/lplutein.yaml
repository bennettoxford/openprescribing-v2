  title: Lutein and antioxidant cost per 1000 patients
  description: Cost of lutein and antioxidant per 1000 patients
  why_it_matters: '<p><a href=''https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#lutein-and-antioxidants-updated-2023'' target=''_Blank''>NHS England guidance states</a>:</p><i><p>The supplements lutein and antioxidants (e.g. vitamin A, C, E and zinc) are sometimes recommended for age-related macular degeneration (AMD). A variety of supplements are available to purchase in health food stores and other outlets where they are promoted to assist with ‘eye health’.</p><p>Two Cochrane reviews have been conducted on this topic:<ol><li><a href=''https://www.cochrane.org/CD000253/EYES_antioxidant-vitamin-and-mineral-supplements-prevent-development-age-related-macular-degeneration-amd'' target=''_blank''>Antioxidant vitamin and mineral supplements for preventing age-related macular degeneration</a>. The authors conclude: ''There is accumulating evidence that taking vitamin E or beta-carotene supplements will not prevent or delay the onset of AMD. There is no evidence with respect to other antioxidant supplements, such as vitamin C, lutein and zeaxanthin, or any of the commonly marketed multivitamin combinations''.</li><li><a href=''https://www.cochrane.org/CD000254/EYES_antioxidant-vitamin-and-mineral-supplements-slow-down-progression-age-related-macular-degeneration'' target=''_blank''>Antioxidant vitamin and mineral supplements for slowing the progression of age-related macular degeneration</a>. The authors conclude: ''People with AMD may experience delay in progression of the disease with antioxidant vitamin and mineral supplementation. This finding is drawn from one large trial conducted in a relatively well-nourished American population. The generalisability of these findings to other populations is not known''.</li></ol><p>PrescQIPP CIC has issued a <a href=''https://www.prescqipp.info/our-resources/bulletins/bulletin-206-antioxidant-vitamins-for-amd/'' target=''_Blank''>bulletin</a> that did not find evidence to support prescribing of lutein and antioxidants routinely on the NHS.</p><p>NICE guidance on AMD includes a recommendation for research on the effectiveness and cost-effectiveness of lutein and antioxidants, which is currently a gap in the research.</p></i><p><b>For guidance on when prescribing may be appropriate in some exceptional circumstances, please see the <a href=''https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#items-where-prescribing-may-be-appropriate-in-some-exceptional-circumstances'' target=''_blank''>full NHS England guidance document.</a></b>'
